# =============================================
# Fly.io app config — Pull API v2 demo
# =============================================
app = "pull-api-v2-demo"
primary_region = "dfw"   # Dallas — closest active region to Guatemala (mia deprecated)

[build]

[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  DEMO_MODE = "true"
  COOKIE_SAMESITE = "None"
  RESEND_FROM_EMAIL = "Pull Events <noreply@tickets.pullevents.com>"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
